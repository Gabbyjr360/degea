<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>She Steps – Step into Luxury</title>
  <link href="https://fonts.googleapis.com/css?family=Playfair+Display:700,900|Cinzel:700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Inter:400,500,700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
        /* Gold and blush accents */
        .gold {
          color: #C2B280;
        }
        .gold-bg {
          background: linear-gradient(90deg, #fff 0%, #C2B280 100%);
        }
        .gold-border {
          border: 1px solid #C2B280;
        }
        .gold-shadow {
          box-shadow: 0 4px 24px 0 #C2B28044;
        }
        .card-gradient {
          background: linear-gradient(135deg, #fff 60%, #F6D1D1 100%);
        }
        .product-card {
          transition: box-shadow 0.4s cubic-bezier(.4,0,.2,1), transform 0.4s cubic-bezier(.4,0,.2,1);
          border-radius: 1.5rem;
          background: linear-gradient(135deg, #fff 60%, #F6D1D1 100%);
          box-shadow: 0 8px 32px 0 #C2B28033, 0 2px 8px 0 #F6D1D1aa;
        }
        .product-card:hover {
          box-shadow: 0 16px 48px 0 #FFD70066, 0 4px 16px 0 #F6D1D1cc;
          transform: scale(1.03);
        }
        .product-img {
          border-radius: 1rem;
          border: none;
          box-shadow: 0 4px 16px 0 #F6D1D144;
        }
        .product-info {
          background: rgba(255,255,255,0.85);
          border-radius: 1rem;
          margin-top: -2rem;
          padding: 1rem 0.5rem;
          box-shadow: 0 2px 8px 0 #F6D1D1aa;
        }
        @media (max-width: 640px) {
          .product-card {
            border-radius: 1rem;
            margin-bottom: 1.5rem;
          }
          .product-img {
            height: 10rem !important;
          }
          .product-info {
            margin-top: -1rem;
            padding: 0.5rem 0.25rem;
          }
        }
    body {
      font-family: 'Inter', Helvetica, Arial, sans-serif;
      background: linear-gradient(180deg, #fff 0%, #F6D1D1 100%);
    }
    .lux-heading {
      font-family: 'Playfair Display', 'Cinzel', serif;
      letter-spacing: 0.02em;
    }
    .lux-body {
      font-family: 'Inter', Helvetica, Arial, sans-serif;
    }
    .parallax-bg {
      background: url('https://images.unsplash.com/photo-1517841905240-472c3c3d7c93?auto=format&fit=crop&w=1400&q=80') center/cover no-repeat;
      background-attachment: fixed;
    }
    .modal-open {
      overflow: hidden;
    }
    .modal {
      transition: opacity 0.4s cubic-bezier(.4,0,.2,1), transform 0.4s cubic-bezier(.4,0,.2,1);
    }
    .modal.show {
      opacity: 1;
      transform: scale(1);
    }
    .modal.hide {
      opacity: 0;
      transform: scale(0.95);
    }
    .cta-pulse {
      animation: ctaPulse 3.5s infinite;
    }
    @keyframes ctaPulse {
      0%, 100% { box-shadow: 0 0 0 0 #F6D1D1; }
      50% { box-shadow: 0 0 16px 4px #F6D1D1; }
    }
    .fade-in {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.6s cubic-bezier(.4,0,.2,1), transform 0.6s cubic-bezier(.4,0,.2,1);
    }
    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .product-img {
      transition: transform 0.4s cubic-bezier(.4,0,.2,1), box-shadow 0.4s cubic-bezier(.4,0,.2,1);
    }
    .product-card:hover .product-img {
      transform: scale(1.05);
      box-shadow: 0 8px 32px 0 #F6D1D1aa;
    }
    .product-info {
      transition: transform 0.4s cubic-bezier(.4,0,.2,1), opacity 0.4s cubic-bezier(.4,0,.2,1);
      transform: translateY(24px);
      opacity: 0;
    }
    .product-card:hover .product-info {
      transform: translateY(0);
      opacity: 1;
    }
    .btn {
      transition: transform 0.3s cubic-bezier(.4,0,.2,1), box-shadow 0.3s cubic-bezier(.4,0,.2,1);
    }
    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 16px 0 #F6D1D1aa;
    }
    .btn:active {
      transform: scale(0.97);
      box-shadow: 0 2px 8px 0 #F6D1D1aa;
    }
    .newsletter:focus {
      box-shadow: 0 0 0 2px #F6D1D1, 0 0 16px 4px #fff;
      outline: none;
      transition: box-shadow 0.4s cubic-bezier(.4,0,.2,1);
    }
    .social-icon {
      transition: color 0.3s cubic-bezier(.4,0,.2,1);
      color: #222;
    }
    .social-icon:hover {
      color: #F6D1D1;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col bg-white text-black">
    <!-- Admin Panel Button -->
    <button id="adminBtn" class="fixed bottom-20 right-6 z-40 btn bg-gray-900 text-white rounded-full shadow-xl flex items-center px-6 py-3 lux-body text-lg">Admin</button>

    <!-- Minimalist Admin Panel Modal -->
    <div id="adminModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-40 modal hide" style="display:none;">
      <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full relative lux-body">
        <button id="closeAdminModal" class="absolute top-4 right-4 btn bg-gray-200 text-black px-4 py-2 rounded-full">&times;</button>
        <div class="lux-heading text-2xl font-semibold mb-6 text-center">Add Product</div>
        <form id="adminForm" class="flex flex-col gap-4">
          <input type="text" id="adminName" class="px-4 py-2 rounded border border-gray-300 lux-body text-lg" placeholder="Product Name" required />
          <input type="text" id="adminPrice" class="px-4 py-2 rounded border border-gray-300 lux-body text-lg" placeholder="Price (TZS)" required />
          <input type="file" id="adminImage" accept="image/*" class="lux-body text-lg" required />
          <input type="text" id="adminDesc" class="px-4 py-2 rounded border border-gray-300 lux-body text-lg" placeholder="Description" required />
          <button class="btn bg-gray-900 text-white rounded-full px-6 py-2 font-semibold lux-body">Add Product</button>
        </form>
      </div>
    </div>

    <!-- (Rest of your 400+ line HTML unchanged) -->

  <script src="https://kit.fontawesome.com/2b2e6e7e2a.js" crossorigin="anonymous"></script>

  <script>
        // Minimalist Admin Panel logic
        document.getElementById('adminBtn').addEventListener('click', () => {
          const modal = document.getElementById('adminModal');
          document.body.classList.add('modal-open');
          modal.style.display = 'flex';
          setTimeout(() => modal.classList.remove('hide'), 10);
          modal.classList.add('show');
        });
        document.getElementById('closeAdminModal').addEventListener('click', () => {
          const modal = document.getElementById('adminModal');
          modal.classList.remove('show');
          modal.classList.add('hide');
          setTimeout(() => {
            modal.style.display = 'none';
            document.body.classList.remove('modal-open');
          }, 400);
        });

        // --- Updated Admin Form Submission with Image Upload ---
        document.getElementById('adminForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const name = document.getElementById('adminName').value;
            const price = document.getElementById('adminPrice').value;
            const desc = document.getElementById('adminDesc').value;
            const fileInput = document.getElementById('adminImage');
            
            let imageUrl = "";
            if (fileInput.files.length > 0) {
                const formData = new FormData();
                formData.append('file', fileInput.files[0]);
                const res = await fetch('http://localhost:3001/upload-image', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                imageUrl = data.url;
            }

            const formBody = new FormData();
            formBody.append("name", name);
            formBody.append("price", price);
            formBody.append("image", imageUrl);
            formBody.append("desc", desc);

            const res = await fetch('http://localhost:3001/products', {
                method: 'POST',
                body: formBody
            });
            const prod = await res.json();
            products.push(prod);
            renderProducts();
            document.getElementById('closeAdminModal').click();
            this.reset();
        });

        // --- Rest of your existing JS for product render, modals, fade-in, etc. ---
  </script>
</body>
</html>
