<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>She Steps – Step into Luxury</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white text-black">

<!-- ADMIN -->
<button id="adminBtn" class="fixed bottom-6 right-6 bg-black text-white px-4 py-2 rounded-full">
  Admin
</button>

<div id="adminModal" class="hidden fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center">
  <div class="bg-white p-6 rounded-lg w-80">
    <form id="adminForm" class="flex flex-col gap-3">
      <input id="adminName" placeholder="Name" required>
      <input id="adminPrice" placeholder="Price" required>

      <input type="file" id="adminImageFile">
      <input id="adminImage" placeholder="Image URL">

      <input id="adminDesc" placeholder="Description" required>

      <button>Add Product</button>
    </form>
  </div>
</div>

<!-- PRODUCTS -->
<div id="productGrid" class="grid grid-cols-2 gap-4 p-6"></div>

<!-- MODAL -->
<div id="productModal" class="hidden fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center">
  <div class="bg-white p-6 rounded">
    <img id="modalImg" class="w-40 h-40 object-cover">
    <h2 id="modalName"></h2>
    <p id="modalPrice"></p>
    <p id="modalDesc"></p>
  </div>
</div>

<script>
let products = []

// ADMIN OPEN
document.getElementById('adminBtn').onclick = () => {
  document.getElementById('adminModal').classList.remove('hidden')
}

// FETCH PRODUCTS
async function fetchProducts(){
  const res = await fetch('http://localhost:3001/products')
  products = await res.json()
  renderProducts()
}

// RENDER
function renderProducts(){
  const grid = document.getElementById('productGrid')

  grid.innerHTML = products.map((p,i)=>`
    <div class="border p-2 cursor-pointer" data-id="${i}">
      <img data-src="${p.image}" class="product-img w-full h-40 object-cover">
      <h3>${p.name}</h3>
      <p>${p.price}</p>
    </div>
  `).join('')

  document.querySelectorAll('.product-img').forEach(img=>{
    img.src = img.dataset.src
  })
}

// ADD PRODUCT (FIXED)
document.getElementById('adminForm').onsubmit = async (e)=>{
  e.preventDefault()

  let imageUrl = document.getElementById('adminImage').value
  const file = document.getElementById('adminImageFile').files[0]

  // upload file if exists
  if(file){
    const fd = new FormData()
    fd.append('file', file)

    const res = await fetch('http://localhost:3001/upload-image',{
      method:'POST',
      body: fd
    })

    const data = await res.json()
    imageUrl = data.url
  }

  if(!imageUrl){
    alert('Add image')
    return
  }

  const fd = new FormData()
  fd.append('name', document.getElementById('adminName').value)
  fd.append('price', document.getElementById('adminPrice').value)
  fd.append('image', imageUrl)
  fd.append('desc', document.getElementById('adminDesc').value)

  const res = await fetch('http://localhost:3001/products',{
    method:'POST',
    body: fd
  })

  const newProd = await res.json()
  products.push(newProd)

  renderProducts()
}

// CLICK PRODUCT (FIXED)
document.getElementById('productGrid').onclick = (e)=>{
  const card = e.target.closest('[data-id]')
  if(!card) return

  const p = products[card.dataset.id]

  document.getElementById('modalImg').src = p.image
  document.getElementById('modalName').innerText = p.name
  document.getElementById('modalPrice').innerText = p.price
  document.getElementById('modalDesc').innerText = p.desc

  document.getElementById('productModal').classList.remove('hidden')
}

fetchProducts()
</script>

</body>
</html>
